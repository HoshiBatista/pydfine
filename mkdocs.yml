site_name: pydfine
site_description: Config-first, ultralytics-style Python library for the D-FINE real-time object detector.
site_url: https://hoshibatista.github.io/pydfine/
repo_url: https://github.com/HoshiBatista/pydfine
repo_name: HoshiBatista/pydfine

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.highlight
    - toc.follow

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_signature_annotations: true
            separate_signature: true
            members_order: source
            merge_init_into_class: true
            filters: ["!^_"]

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite

# Agent-facing planning doc — not part of the published site.
exclude_docs: |
  ROADMAP.md

nav:
  - Home: index.md
  - Architecture: ARCHITECTURE.md
  - Config reference: CONFIG_REFERENCE.md
  - Segmentation training: seg-training.md
  - API:
      - DFINE: api/model.md
      - DFINEConfig: api/config.md
      - Results & Boxes: api/results.md
      - Tracking: api/tracking.md
      - Data & convert: api/data.md
      - Export: api/export.md
