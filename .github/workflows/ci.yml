name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install ruff
        run: python -m pip install --upgrade pip ruff
      - name: ruff format --check
        run: ruff format --check .
      - name: ruff check
        run: ruff check .

  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + dev extras (CPU-only torch)
        # Install CPU wheels of torch/torchvision *first* so the ".[dev]" resolve finds
        # torch already satisfied and never pulls the multi-GB CUDA nvidia-*-cu12 stack
        # (CI runs on CPU only — the GPU build overflows the runner disk). --no-cache-dir
        # keeps pip from also stashing those wheels on the same limited disk.
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir torch torchvision \
            --index-url https://download.pytorch.org/whl/cpu
          python -m pip install --no-cache-dir -e ".[dev]"
      - name: Run tests
        run: pytest -q
