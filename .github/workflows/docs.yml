name: Docs

on:
  push:
    branches: [main]
    # Only rebuild when something that affects the site changes.
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "dfine/**"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    name: Build + deploy MkDocs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install docs deps
        # mkdocstrings reads the source statically (griffe), so torch is not needed.
        run: python -m pip install --upgrade pip && python -m pip install ".[docs]"
      - name: Build site (strict)
        run: mkdocs build --strict --site-dir _site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
