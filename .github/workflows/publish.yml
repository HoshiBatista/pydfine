name: Publish to PyPI

# Publishes on a GitHub Release (create a release from a `vX.Y.Z` tag) and can be
# dry-run manually. Uses PyPI Trusted Publishing (OIDC) — no API token is stored.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: python -m pip install --upgrade pip build twine && python -m build
      - name: Check metadata
        run: twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Only publish on an actual Release event, never on manual dry-runs.
    if: github.event_name == 'release'
    environment:
      name: pypi
      url: https://pypi.org/p/pydfine
    permissions:
      id-token: write # OIDC token for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
